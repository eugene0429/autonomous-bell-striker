# Capstone 2026 — runtime parameters (single source of truth)
#
# Used by:
#   pipeline.py                  (full pipeline)
#   run_phase1_visual_servo.py   (Phase 1 only)
#   run_phase2_aiming.py         (Phase 2 only)
#   run_center_depth_probe.py    (depth probe)
#
# The CLI toggles (--mode / --dry-run / --debug-detect) override the yaml values.
# All other numbers/strings only need to be changed here.

# ── Run mode (pipeline.py only) ──
mode: real                       # sim | real

# ── Vehicle geometry ──
vehicle:
  wheel_diameter: 0.10
  wheel_base: 0.30

# ── Control loop ──
loop:
  dt: 0.067                      # 15 Hz

# ── Start pose (sim only) ──
sim_start:
  x: 0.0
  y: 0.0
  theta_deg: 0.0

# ── Phase 1 (visual servo) ──
phase1:
  timeout_sec: 60.0
  log_every_s: 0.5

  # VisualServoController gains/limits (directly affect deceleration behavior)
  controller:
    # Image frame (only edit when changing resolution)
    img_w: 640
    img_h: 480

    # Heading PID
    kp_h: 0.003                  # (rad/s)/px
    ki_h: 0.0003
    kd_h: 0.0

    # Tilt PI
    kp_tilt: 0.05                # deg/px
    ki_tilt: 0.0
    tilt_min_deg: 0.0
    tilt_max_deg: 95.0
    # Cap to match the mast's physical slew (open-loop TILT_ASYNC → if the cmd
    # outruns the real hardware, tilt-stop triggers early). Tune by measurement.
    # null = unlimited (legacy).
    tilt_max_rate_dps: 60.0

    # Forward speed
    kp_v: 1.2                    # v = kp_v * horiz_dist * align
    v_max: 0.17                   # [m/s]
    omega_max: 0.4               # [rad/s]

    # Stop condition (the core of deceleration tuning)
    d_stop_m: 0.5                # stop candidate if filtered horiz_dist < this value
    tilt_stop_range_deg: [85.0, 95.0]
    stop_debounce_frames: 4      # must hold for N consecutive frames to be DONE (inertia compensation)
    # Tilt-based approach brake: linearly decelerate v from 1.0 → 0 between
    # this angle and stop_range[0]=85°. tilt acts as a distance proxy (the
    # closer the bell is overhead, the higher the tilt), so it stops smoothly
    # even when depth breaks down.
    # null = disabled (i.e. cruise at v_max right up until stop).
    tilt_brake_start_deg: 65.0

    # Post-stop fine alignment: after the stop trigger, move forward/backward
    # very slowly to precisely align horiz_dist to d_stop_m. With the current
    # settings (tilt_brake on), horiz at the stop point may be closer or
    # farther than the target, so post-processing alignment is needed.
    # heading / tilt stay frozen (omega=0, tilt_cmd hold).
    align_enabled: false
    align_v: 0.03                # [m/s] alignment speed (slower = more accurate, takes longer)
    align_tol_m: 0.01            # satisfied if |horiz - d_stop_m| < this value
    align_debounce_frames: 3     # satisfied for N consecutive frames → DONE
    align_timeout_s: 5.0        # force DONE after N seconds even if alignment isn't finished

    # Vibration robustness
    horiz_dist_lp_alpha: 0.2     # LPF α on horiz_dist
    tilt_err_deadband_px: 8

    # FSM lost-handling
    coast_lost_frames: 8
    hold_lost_frames: 15
    coast_speed_scale: 1.0
    # SEARCH behavior: forward creep instead of rotating. The bell is usually
    # near the front, so it's safer to keep the heading lock and slowly creep
    # forward until reacquiring it.
    search_creep_v: 0.05           # [m/s]
    search_timeout_s: 15.0

  # Bootstrap (initial sweep + creep retry)
  bootstrap:
    creep_v: 0.2
    creep_s: 3.0
    creep_retries: 3

  # Sim-only dummy target / noise
  sim:
    x: 3.0
    y: 2.0
    bbox_noise_px: 0.0
    depth_noise_m: 0.0
    dropout_prob: 0.0

# ── Phase 2 (aiming & strike) ──
phase2:
  num_strikes: 3
  strike_interval_sec: 3.0
  tilt_settle_sec: 0.5
  plate_settle_sec: 0.3
  tilt_deg: 90.0

  # Aim mode: static | lead | center
  aim_mode: center
  static_reuse: false            # reuse the first measurement in static aim (legacy --static)

  # Measurement window (static mode)
  measurement:
    duration_sec: 1.0
    min_frames: 15
    min_conf: 0.5
    depth_roi_frac: 0.4
    depth_min_valid: 10

  # Launcher / camera plate-frame correction
  launcher:
    offset: [-0.01, 0.0, 0.0]    # x, y, z [m]
    tilt_deg: [-4.0, 0.0]        # x_tilt, y_tilt [deg]
  camera:
    offset: [0.157, -0.010, -0.074]   # plate-frame translation [m]

  # Sim-only dummy target
  sim:
    x: 0.10
    y: 0.0
    z: 3.0
    jitter: 0.05

  # Lead-aim (vertically oscillating bell)
  lead:
    amplitude_m: 0.25
    half_period_min_s: 3.0
    half_period_max_s: 6.0
    total_delay_sec: 0.7
    inter_shot_sec: 3.0
    spin_warmup_sec: 1.0
    max_wait_sec: 15.0
    safety_margin_m: 0.03

  # Center-aim (vertical oscillation, plate static)
  center:
    calibration_sec: 0
    z_top: 2.073
    z_bot: 1.765
    bell_diameter: 0.12
    safety_margin_m: 0.01
    fit_window_samples: 0
    direction_streak: 3
    direction_streak_eps: 0.005
    # Minimum |v̂| [m/s] for ready/endpoint decisions. Below this value the bell
    # is considered nearly stopped, so firing is refused + endpoint detection is
    # also held off. Decrease it to catch low-amplitude/low-speed oscillation,
    # increase it to be more conservative against noise. Default 0.03 = 3 cm/s.
    endpoint_v_eps_mps: 0.01
    total_delay_sec: 1.3
    inter_shot_sec: 3.0
    xy_meas_sec: 0.5
    spin_warmup_sec: 1.5
    max_wait_sec: 20.0

# ── Detector backend ──
detector:
  backend: hailo                 # hailo | ultralytics
  conf: 0.3
  device: "0"                    # ultralytics: '0' | 'cpu' | 'mps'
  weights: null                  # ultralytics .pt path (null = auto)
  hef: null                      # hailo .hef path (null = auto)
  classes: null                  # int list filter (ultralytics)

# ── OpenRB serial ──
serial:
  port: /dev/ttyACM0
  baud: 115200
  dry_run: false

# ── Flywheel + loader ──
fire:
  rpm: 3000
  hold_ms: 1500

# ── debug toggles ──
debug:
  detect: false                  # phase 1 per-frame raw detection log

# ── Depth probe (run_center_depth_probe.py only) ──
probe:
  conf: 0.6
  roi_frac: 0.3
  min_valid: 10
  max_frames: 0                  # 0 = run until Ctrl-C
  hw_reset: false
